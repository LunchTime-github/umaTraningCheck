  <circle cx="26" cy="15" r="7" fill="white" opacity="0.95"/>
  <!-- 몸통 (달리기 자세, 앞으로 기울어진) -->
  <path d="M23 22 Q26 20 30 22 L32 34 Q28 37 24 34 Z" fill="white" opacity="0.9"/>
  <!-- 왼팔 (뒤로) -->
  <line x1="23" y1="26" x2="13" y2="32" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
  <!-- 오른팔 (앞으로) -->
  <line x1="30" y1="25" x2="40" y2="19" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
  <!-- 왼다리 (앞으로 뻗음) -->
  <line x1="24" y1="34" x2="16" y2="46" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="16" y1="46" x2="11" y2="55" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <!-- 오른다리 (뒤로 뻗음) -->
  <line x1="30" y1="34" x2="40" y2="46" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="40" y1="46" x2="48" y2="55" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <!-- 꼬리 -->
  <path d="M32 30 Q44 35 42 50" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <!-- 속도감 선 -->
  <line x1="6" y1="28" x2="14" y2="28" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="4" y1="33" x2="14" y2="33" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
</svg>
